<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TalkTrack popup preview</title>
  <link rel="stylesheet" href="../vendor/kk/vars.css">
  <link rel="stylesheet" href="../vendor/kk/style.css">
  <link rel="stylesheet" href="../popup.css">
  <script>
    // Stub chrome.* so popup.js can run outside the extension context.
    window.chrome = {
      runtime: {
        sendMessage: () => Promise.resolve({
          recording: true, startedAt: Date.now() - 192000,
          last: {
            id: "20260426-114530",
            folder: "talktrack/session-20260426-114530",
            durationMs: 192000,
            events: 47
          }
        })
      }
    };
  </script>
</head>
<body class="talktrack-popup">
  <div class="app" data-view="inspector">
  <aside class="inspector" aria-label="TalkTrack">

    <section class="inspector__group">
      <header class="card card--heading">
        <h2 class="t-display">TalkTrack</h2>
        <p class="t-caption t-muted">Voice plus taps, on any page.</p>
      </header>

      <article class="card" id="recorder" data-mode="idle">
        <div class="card__heading" data-mode-show="idle">
          <h3 class="t-title">Ready to record</h3>
          <p class="t-caption">Hit start. Talk through the page. Click whatever you want to mark.</p>
        </div>

        <div class="card__heading" data-mode-show="recording" hidden>
          <h3 class="t-display" id="elapsed">00:00</h3>
          <p class="t-caption">Recording. Click anywhere on the page to mark a moment. Speak freely.</p>
        </div>

        <button class="button button--primary t-subtitle" id="start" data-mode-show="idle" type="button">Start recording</button>
        <button class="button button--primary t-subtitle" id="stop" data-mode-show="recording" type="button" hidden>Stop</button>
      </article>

      <article class="card" id="session" hidden>
        <div class="card__heading">
          <h3 class="t-title">Last session</h3>
          <p class="t-caption">Paste this into your agent. It names the folder and what each file holds.</p>
          <pre class="t-code t-code--block" id="session-briefing"></pre>
        </div>
        <button class="button t-subtitle" id="copy-briefing" type="button">Copy for agent</button>
      </article>
    </section>

  </aside>
  </div>
  <script src="../popup.js"></script>
</body>
</html>
